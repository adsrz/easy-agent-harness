name: Repo-Only Validation

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run repo-only validation
        shell: pwsh
        run: ./tools/Test-All.ps1 -RepoOnly
